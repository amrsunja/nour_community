name: nour
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# IOS
version: 1.0.0+1

# Android
#version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localization
  intl: ^0.20.2

  # State management
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1

  # Network
  dio: ^5.8.0+1
  dio_smart_retry: ^7.0.1
  internet_connection_checker_plus: ^2.7.1

  # Talker 
  talker: ^5.1.17
  talker_flutter: ^5.1.16

  # Server
  supabase_flutter: ^2.12.0

  # Sound effects (low-latency one-shots)
  sound_effect: ^0.1.3

  # OAuth (native id-token sign in)
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Database
  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^10.0.0

  # Navigation
  auto_route: ^11.1.0

  # In app purchase
  in_app_purchase: ^3.2.3
  in_app_purchase_storekit: ^0.4.8

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.0
  app_settings: ^7.0.0
  permission_handler: ^12.0.1
  flutter_timezone: ^5.0.1

  # Media
  image_picker: ^1.2.1

  # UI
  flutter_svg: ^2.1.0
  google_fonts: ^6.3.3
  shimmer: ^3.0.0
  dismissible_page: ^1.0.2
  cupertino_icons: ^1.0.8
  blur: ^4.0.2
  lottie: ^3.3.3

  # Audio player
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17

  # Islamic tools
  quran: ^1.4.1
  adhan_dart: ^2.0.1
  hijri: ^3.0.0


  # Utils
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  flutter_animate: ^4.5.2
  multiple_result: ^5.2.0
  freezed_annotation: ^3.1.0
  collection: ^1.19.1
  equatable: ^2.0.7
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.1.0
  package_info_plus: ^9.0.0
  animated_text_kit: ^4.3.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  shared_preferences: ^2.5.5
  share_plus: ^12.0.0

  # Qibla / compass sensor (raw sensors, fused into a tilt-compensated heading)
  sensors_plus: ^6.1.1




dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: 
  auto_route_generator: ^10.4.0
  flutter_gen_runner: ^5.12.0
  freezed: ^3.2.3
  icons_launcher: ^3.0.3
  package_rename: ^1.10.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/
    - assets/sounds/
    - .env
